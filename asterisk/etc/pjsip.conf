; ===== Global =====

[global]
type = global
endpoint_identifier_order = username,ip,anonymous

; ===== Transport =====

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

[transport-ws]
type = transport
protocol = ws
bind = 0.0.0.0:8088

; ===== 에이전트 내선 5005 (WebRTC/WebSocket) =====

[5005]
type = endpoint
context = from-internal
identify_by = username
disallow = all
allow = ulaw
allow = alaw
allow = opus
transport = transport-ws
auth = 5005
aors = 5005
use_avpf = yes
media_encryption = dtls
dtls_auto_generate_cert = yes
dtls_verify = fingerprint
dtls_setup = actpass
rtcp_mux = yes
bundle = yes
ice_support = yes

[5005]
type = auth
auth_type = userpass
username = 5005
password = ippbx5005

[5005]
type = aor
max_contacts = 2
remove_existing = yes

; ===== PSTN 게이트웨이 → SIPp mock (127.0.0.1:5070) =====

[GATEWAY]
type = endpoint
context = from-trunk
disallow = all
allow = ulaw
transport = transport-udp
aors = GATEWAY_aor

[GATEWAY_aor]
type = aor
contact = sip:127.0.0.1:5070
