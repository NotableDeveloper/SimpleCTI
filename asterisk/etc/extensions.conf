[general]
static = yes
writeprotect = no
clearglobalvars = no

; ===== 에이전트 내선 컨텍스트 =====

[from-internal]
; 에이전트(5005)가 SIP.js에서 직접 INVITE를 보낼 때 GATEWAY로 라우팅
exten => _X.,1,NoOp(From internal outbound: ${EXTEN})
 same => n,Set(G_RECORD_CALL=true)
 same => n,Dial(PJSIP/${EXTEN}@GATEWAY,30)
 same => n,Hangup()

; ===== 발신 통화 컨텍스트 =====

[outbound_sample]
; Spring Boot OriginateAction이 사용하는 컨텍스트
; channel=PJSIP/5005, context=outbound_sample, exten=<고객번호>
; → 에이전트(5005)가 응답하면 고객에게 GATEWAY를 통해 발신
exten => _.,1,NoOp(Outbound call to ${EXTEN})
 same => n,Set(G_RECORD_CALL=true)
 same => n,Dial(PJSIP/${EXTEN}@GATEWAY,30)
 same => n,Hangup()

; ===== 인바운드 컨텍스트 (GATEWAY/SIPp에서 오는 호출) =====

[from-trunk]
exten => _.,1,Answer()
 same => n,Wait(30)
 same => n,Hangup()
